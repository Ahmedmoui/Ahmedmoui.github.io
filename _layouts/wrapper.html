<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    

    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/syntax.css">

    <!-- Enables scroll-reveal hidden states only when JS runs, so content
         is never permanently hidden if JS is disabled or fails to load. -->
    <script>document.documentElement.classList.add('reveal-enabled');</script>

    <script src="{{ '/assets/js/script.js' | relative_url }}" defer></script>

    
    <title>{% if page.title %}{{ page.title }} — {{ site.name }}{% else %}{{ site.title }}{% endif %}</title>

    <!-- Open Graph / social link previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
    <meta property="og:site_name" content="{{ site.name }}" />
    <meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.name }}{% else %}{{ site.title }}{% endif %}" />
    <meta property="og:description" content="{{ site.description | strip_html | strip_newlines | truncate: 160 }}" />
    <meta property="og:image" content="{{ site.url }}{{ site.profile_image }}" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} — {{ site.name }}{% else %}{{ site.title }}{% endif %}" />
    <meta name="twitter:description" content="{{ site.description | strip_html | strip_newlines | truncate: 160 }}" />
    <meta name="twitter:image" content="{{ site.url }}{{ site.profile_image }}" />

</head>
<body>
    <!-- NAVBAR -->
     {% include navbar.html%}

     <div class="page">{{content}}</div>

     
</body>

    {% include footer.html%}
</html>
